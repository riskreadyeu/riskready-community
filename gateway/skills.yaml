# gateway/skills.yaml
# MCP Skill Registry — defines all available MCP servers for the Gateway
# Tool metadata auto-extracted from MCP server source files

skills:
  - name: riskready-controls
    description: "Security controls, SOA, assessments, metrics, gap analysis"
    tags: [grc, controls, compliance, soa, iso27001]
    capabilities: [query, mutation]
    command: npx
    args: [tsx, ../mcp-server-controls/src/index.ts]
    requiresDb: true
    tools:
      - name: get_gap_analysis
        description: Get gap analysis from assessment results — identifies controls with FAIL or PART
        args: [assessmentId]
      - name: get_overdue_tests
        description: Get assessment tests that are past their due date.
        args: [skip, take]
      - name: get_assessment_completion_summary
        description: "Get detailed completion summary for a specific assessment: test counts by status"
        args: [assessmentId]
      - name: get_control_coverage_matrix
        description: Get each applicable control with its latest assessment test result and metric RA
        args: [organisationId]
      - name: get_tester_workload
        description: "Get per-tester breakdown of assigned, pending, and completed tests across active"
        args: []
      - name: list_assessments
        description: List control assessments with optional status filter.
        args: [status, skip, take]
      - name: get_assessment
        description: "Get a single assessment with full details: controls in scope, scope items, test "
        args: [id]
      - name: get_assessment_tests
        description: Get tests within an assessment with optional status/result filters.
        args: [assessmentId, status, result]
      - name: get_assessment_stats
        description: "Get aggregate assessment statistics: total assessments, by status, completion ra"
        args: []
      - name: get_my_tests
        description: Get tests assigned to a specific tester.
        args: [testerId, status]
      - name: get_my_tests_count
        description: Get per-status test counts for a specific tester across active assessments.
        args: [testerId]
      - name: list_controls
        description: List controls from the library with optional filters.
        args: [framework, theme, implementationStatus, applicable, skip, take]
      - name: get_control
        description: "Get a single control with full details: metrics, evidence links, risk scenario l"
        args: [id]
      - name: get_control_stats
        description: "Get aggregate statistics for the control library: total count, by theme, by fram"
        args: []
      - name: search_controls
        description: Search controls by name or controlId pattern.
        args: [query, framework]
      - name: list_scope_items
        description: "List scope items (applications, asset classes, locations, etc."
        args: [scopeType, criticality, isActive, skip, take]
      - name: get_effectiveness_report
        description: Get a control implementation effectiveness report showing implementation rates a
        args: [organisationId]
      - name: find_controls_by_ids
        description: Retrieve multiple controls by their UUIDs in a single query.
        args: [ids]
      - name: get_scope_item
        description: Get a single scope item with full details including usage counts across assessme
        args: [id]
      - name: list_metrics
        description: "List metrics for a control with RAG status, trend, and current value."
        args: [controlId]
      - name: get_metric
        description: Get a single control metric with full details and measurement history.
        args: [id]
      - name: get_metric_dashboard
        description: "Get an organisation-wide metric summary: total metrics, RAG distribution, trend "
        args: []
      - name: propose_assessment
        description: Propose creating a new control assessment.
        args: [organisationId, assessmentRef, title, description, leadTesterId, reviewerId, plannedStartDate, plannedEndDate, dueDate, periodStart, periodEnd, actualStartDate, actualEndDate, controlIds, scopeItemIds, status, reason, mcpSessionId]
      - name: propose_update_assessment
        description: "Propose updating assessment details (title, dates, team)."
        args: [assessmentId, title, description, leadTesterId, reviewerId, plannedStartDate, plannedEndDate, dueDate, periodStart, periodEnd, actualStartDate, actualEndDate, status, reason, mcpSessionId]
      - name: propose_delete_assessment
        description: Propose deleting a draft assessment.
        args: [assessmentId, reason, mcpSessionId]
      - name: propose_start_assessment
        description: Propose starting a draft assessment (DRAFT → IN_PROGRESS).
        args: [assessmentId, reason, mcpSessionId]
      - name: propose_submit_assessment_review
        description: Propose submitting an assessment for review (IN_PROGRESS → UNDER_REVIEW).
        args: [assessmentId, reason, mcpSessionId]
      - name: propose_complete_assessment
        description: Propose completing an assessment under review (UNDER_REVIEW → COMPLETED).
        args: [assessmentId, reviewNotes, reason, mcpSessionId]
      - name: propose_cancel_assessment
        description: Propose cancelling an assessment.
        args: [assessmentId, cancelReason, reason, mcpSessionId]
      - name: propose_add_assessment_controls
        description: Propose adding controls to an assessment scope.
        args: [assessmentId, controlIds, reason, mcpSessionId]
      - name: propose_remove_assessment_control
        description: Propose removing a control from an assessment scope.
        args: [assessmentId, controlId, reason, mcpSessionId]
      - name: propose_add_assessment_scope_items
        description: Propose adding scope items to an assessment.
        args: [assessmentId, scopeItemIds, reason, mcpSessionId]
      - name: propose_remove_assessment_scope_item
        description: Propose removing a scope item from an assessment.
        args: [assessmentId, scopeItemId, reason, mcpSessionId]
      - name: propose_populate_tests
        description: Propose auto-generating tests for an assessment based on its controls in scope.
        args: [assessmentId, reason, mcpSessionId]
      - name: propose_bulk_assign_tests
        description: "Propose bulk-assigning tests to testers, owners, or assessors."
        args: [testIds, assignedTesterId, ownerId, assessorId, testMethod, reason, mcpSessionId]
      - name: propose_soa_entry_update
        description: Propose updating an SOA entry — change applicability or implementation status.
        args: [soaEntryId, applicable, implementationStatus, implementationDesc, justificationIfNa, controlRecordId, parentRiskId, scenarioIds, reason, mcpSessionId]
      - name: propose_create_soa
        description: Propose creating a new empty Statement of Applicability.
        args: [version, name, notes, organisationId, reason, mcpSessionId]
      - name: propose_create_soa_from_controls
        description: Propose creating a new SOA pre-populated with entries from all applicable contro
        args: [version, name, organisationId, reason, mcpSessionId]
      - name: propose_create_soa_version
        description: Propose creating a new SOA version by copying entries from an existing SOA.
        args: [sourceSoaId, newVersion, name, notes, reason, mcpSessionId]
      - name: propose_update_soa
        description: "Propose updating SOA metadata (name, notes)."
        args: [soaId, name, notes, reason, mcpSessionId]
      - name: propose_submit_soa_review
        description: Propose submitting an SOA for review (DRAFT → PENDING_REVIEW).
        args: [soaId, reason, mcpSessionId]
      - name: propose_approve_soa
        description: Propose approving an SOA under review (PENDING_REVIEW → APPROVED).
        args: [soaId, reason, mcpSessionId]
      - name: propose_delete_soa
        description: Propose deleting a draft SOA.
        args: [soaId, reason, mcpSessionId]
      - name: propose_scope_item
        description: "Propose adding a new scope item (application, asset class, location, etc."
        args: [organisationId, scopeType, code, name, description, criticality, isActive, reason, mcpSessionId]
      - name: propose_update_scope_item
        description: "Propose updating a scope item\\"
        args: [scopeItemId, name, description, criticality, isActive, reason, mcpSessionId]
      - name: propose_delete_scope_item
        description: Propose deleting a scope item.
        args: [scopeItemId, reason, mcpSessionId]
      - name: propose_test_result
        description: Propose recording a test result for an assessment test.
        args: [assessmentTestId, result, findings, recommendations, testMethod, rootCause, rootCauseNotes, remediationEffort, estimatedHours, estimatedCost, assignedTesterId, reason, mcpSessionId]
      - name: propose_remediation
        description: Propose a remediation action for a failed assessment test.
        args: [assessmentTestId, title, description, priority, estimatedHours, reason, mcpSessionId]
      - name: propose_update_test
        description: Propose updating test assignment or method details.
        args: [assessmentTestId, testMethod, ownerId, assessorId, assignedTesterId, status, result, reason, mcpSessionId]
      - name: propose_assign_tester
        description: Propose assigning a specific tester to a test.
        args: [assessmentTestId, testerId, reason, mcpSessionId]
      - name: propose_update_root_cause
        description: Propose updating root cause analysis for a failed or partial test.
        args: [assessmentTestId, rootCause, rootCauseNotes, remediationEffort, estimatedHours, estimatedCost, reason, mcpSessionId]
      - name: propose_skip_test
        description: Propose skipping a test with justification.
        args: [assessmentTestId, justification, reason, mcpSessionId]
      - name: propose_control_status
        description: "Propose changing a control\\"
        args: [controlId, implementationStatus, implementationDesc, applicable, justificationIfNa, reason, mcpSessionId]
      - name: propose_create_control
        description: Propose creating a new control in the library.
        args: [controlId, name, theme, description, framework, sourceStandard, soc2Criteria, tscCategory, applicable, justificationIfNa, implementationStatus, implementationDesc, organisationId, reason, mcpSessionId]
      - name: propose_update_control
        description: "Propose updating an existing control\\"
        args: [controlId, name, description, theme, framework, sourceStandard, soc2Criteria, tscCategory, applicable, justificationIfNa, implementationStatus, implementationDesc, reason, mcpSessionId]
      - name: propose_disable_control
        description: Propose disabling a control (soft-delete).
        args: [controlId, disableReason, reason, mcpSessionId]
      - name: propose_enable_control
        description: Propose re-enabling a disabled control.
        args: [controlId, reason, mcpSessionId]
      - name: propose_metric_value
        description: Propose recording a new metric measurement value.
        args: [metricId, value, status, notes, reason, mcpSessionId]
      - name: list_soas
        description: "List Statement of Applicability (SOA) versions with status, approval info, and e"
        args: [status, skip, take]
      - name: get_soa
        description: Get a full Statement of Applicability with all entries showing control applicabi
        args: [id]
      - name: get_soa_entry
        description: "Get a single SOA entry with applicability decision, implementation status, and l"
        args: [id]
      - name: get_soa_stats
        description: "Get aggregate SOA statistics: total SOAs, by status, and latest SOA entry summar"
        args: []
      - name: get_latest_soa
        description: Get the most recent Statement of Applicability with full entries and summary sta
        args: [organisationId]
      - name: get_test
        description: "Get a full test definition (AssessmentTest) with procedure, evidence requirement"
        args: [id]
      - name: get_test_executions
        description: Get execution history for an assessment test instance.
        args: [assessmentTestId]
      - name: list_test_templates
        description: Browse test templates.
        args: [layer, skip, take]

