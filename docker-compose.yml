services:
  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-riskready}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-riskready}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riskready}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend
    restart: unless-stopped

  migrate:
    build:
      context: ./apps/server
      target: migrate
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=1536"
      DATABASE_URL: postgresql://${POSTGRES_USER:-riskready}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-riskready}?schema=public
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - backend
    restart: "no"

  server:
    build:
      context: ./apps/server
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-riskready}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-riskready}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_SESSION_TTL_DAYS: ${REFRESH_SESSION_TTL_DAYS:-14}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${HOST_PORT:-9380}}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - evidence_data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-riskready}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-riskready}?schema=public
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GATEWAY_PORT: 3100
      GATEWAY_SECRET: ${GATEWAY_SECRET:-}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-9380}:80"
    environment:
      WEB_UPSTREAM: ${WEB_UPSTREAM:-web:80}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  evidence_data:
  caddy_data:
  caddy_config:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
